# CarAgent Training Configuration
# Run with: mlagents-learn CarTrainer.yaml --run-id=CarRun1
#
# Prerequisites:
#   pip install mlagents torch
#   Place this file next to your Unity project (or anywhere accessible)
#
# Tips:
#   - Start training: mlagents-learn CarTrainer.yaml --run-id=CarRun1
#   - Resume:         mlagents-learn CarTrainer.yaml --run-id=CarRun1 --resume
#   - Watch in TB:    tensorboard --logdir results

behaviors:
  CarAgent:
    trainer_type: ppo          # Proximal Policy Optimization — good default for continuous control

    hyperparameters:
      batch_size: 2048         # Samples per gradient update
      buffer_size: 20480       # Experience replay buffer
      learning_rate: 3.0e-4
      beta: 5.0e-3             # Entropy regularization (exploration)
      epsilon: 0.2             # PPO clip range
      lambd: 0.95              # GAE lambda
      num_epoch: 3             # Epochs per update
      learning_rate_schedule: linear

    network_settings:
      normalize: true          # Normalize observations (important for velocity inputs)
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple

    reward_signals:
      extrinsic:
        gamma: 0.99            # Discount factor
        strength: 1.0

      curiosity:               # Intrinsic curiosity — helps the car explore the track
        gamma: 0.99
        strength: 0.02
        encoding_size: 256
        learning_rate: 1.0e-3

    keep_checkpoints: 5
    checkpoint_interval: 50000

    max_steps: 5000000         # Total training steps — increase for longer/harder tracks
    time_horizon: 1000         # Steps per episode before forced reset
    summary_freq: 10000        # Log to TensorBoard every N steps

    # Threaded environment collection for speed
    threaded: true
